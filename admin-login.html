<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Login - Krishnam's Premium CMS</title>
  <link rel="stylesheet" href="css/admin-login.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.5.0/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.5.0/firebase-auth.js"></script>
</head>
<body>
  <!-- ============================================================================
       BACKGROUND ANIMATION ELEMENTS
       ============================================================================ -->
  <div class="background-gradient"></div>
  <div class="glow-orb glow-orb-1"></div>
  <div class="glow-orb glow-orb-2"></div>
  <div class="glow-orb glow-orb-3"></div>

  <!-- ============================================================================
       LOGIN CONTAINER
       ============================================================================ -->
  <div class="login-container">
    <div class="login-card">
      <!-- Header -->
      <div class="login-header">
        <div class="login-logo">
          <span class="logo-icon">🔐</span>
          <h1>Admin Portal</h1>
        </div>
        <p class="login-subtitle">Secure Access to Your Premium CMS</p>
      </div>

      <!-- Login Form -->
      <form id="loginForm" class="login-form">
        <!-- Email Input -->
        <div class="form-group">
          <label for="email" class="form-label">Email Address</label>
          <div class="input-wrapper">
            <input 
              type="email" 
              id="email" 
              class="form-input" 
              placeholder="admin@krishnam.com"
              required
            />
            <div class="input-icon">📧</div>
          </div>
        </div>

        <!-- Password Input -->
        <div class="form-group">
          <label for="password" class="form-label">Password</label>
          <div class="input-wrapper">
            <input 
              type="password" 
              id="password" 
              class="form-input" 
              placeholder="••••••••"
              required
            />
            <button type="button" class="password-toggle" id="passwordToggle">
              <span class="toggle-icon">👁️</span>
            </button>
          </div>
        </div>

        <!-- Remember Me & Forgot Password -->
        <div class="form-options">
          <label class="remember-me">
            <input type="checkbox" id="rememberMe" />
            <span>Remember me</span>
          </label>
          <a href="#" class="forgot-password">Forgot password?</a>
        </div>

        <!-- Error Message -->
        <div class="error-message" id="errorMessage"></div>

        <!-- Login Button -->
        <button type="submit" class="login-button" id="loginBtn">
          <span class="button-text">Sign In</span>
          <span class="button-loader"></span>
        </button>
      </form>

      <!-- Footer -->
      <div class="login-footer">
        <p class="footer-text">Protected Admin Area</p>
        <p class="footer-hint">Default: admin@krishnam.com / ccfcma074r@</p>
      </div>
    </div>

    <!-- Side Decoration -->
    <div class="login-decoration">
      <div class="decoration-item decoration-1"></div>
      <div class="decoration-item decoration-2"></div>
      <div class="decoration-item decoration-3"></div>
    </div>
  </div>

  <!-- ============================================================================
       SCRIPTS
       ============================================================================ -->
  <script src="js/firebase-config.js"></script>
  <script src="js/auth-manager.js"></script>
  <script src="js/admin-login.js"></script>
</body>
</html>
