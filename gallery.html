<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gallery - Krishnam Dwivedi | AI & Web Development Portfolio</title>
  
  <meta name="description" content="Gallery - Visual portfolio of projects, designs, and achievements.">
  <meta name="keywords" content="gallery, portfolio, projects, designs">
  
  <meta property="og:title" content="Gallery - Krishnam Dwivedi">
  <meta property="og:description" content="Visual portfolio gallery showcasing projects and designs">
  
  <link rel="stylesheet" href="css/main.css">
  <link rel="stylesheet" href="css/premium-3d.css">
  <link rel="stylesheet" href="css/advanced-3d.css">
  <style>
    .gallery-section {
      padding: 100px 20px;
      min-height: 100vh;
    }

    .gallery-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
      gap: 2rem;
      margin-top: 3rem;
    }

    .gallery-item {
      position: relative;
      overflow: hidden;
      border-radius: var(--radius-lg);
      background: rgba(31, 31, 46, 0.4);
      backdrop-filter: blur(10px);
      border: 1px solid rgba(168, 85, 247, 0.2);
      transition: all var(--transition-normal);
      aspect-ratio: 1;
    }

    .gallery-item:hover {
      border-color: rgba(168, 85, 247, 0.4);
      box-shadow: 0 12px 40px rgba(168, 85, 247, 0.2);
      transform: translateY(-8px);
    }

    .gallery-image-container {
      width: 100%;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, rgba(168, 85, 247, 0.1), rgba(13, 110, 253, 0.05));
      position: relative;
      overflow: hidden;
    }

    .gallery-image {
      width: 100%;
      height: 100%;
      object-fit: cover;
      transition: transform var(--transition-normal);
    }

    .gallery-item:hover .gallery-image {
      transform: scale(1.05);
    }

    .gallery-placeholder {
      font-size: 4rem;
      opacity: 0.5;
    }

    .gallery-overlay {
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, rgba(168, 85, 247, 0.2), rgba(13, 110, 253, 0.1));
      opacity: 0;
      transition: opacity var(--transition-normal);
      display: flex;
      align-items: flex-end;
      padding: 1.5rem;
    }

    .gallery-item:hover .gallery-overlay {
      opacity: 1;
    }

    .gallery-title {
      color: white;
      font-weight: 600;
      font-size: 0.95rem;
    }

    .empty-gallery {
      text-align: center;
      padding: 4rem 2rem;
      background: rgba(31, 31, 46, 0.3);
      border-radius: var(--radius-lg);
      border: 1px dashed rgba(168, 85, 247, 0.2);
    }

    .empty-gallery-icon {
      font-size: 4rem;
      margin-bottom: 1rem;
      opacity: 0.6;
    }

    .empty-gallery-text {
      color: var(--text-secondary);
      font-size: 1.1rem;
      margin-bottom: 0.5rem;
    }

    .empty-gallery-subtext {
      color: var(--text-tertiary);
      font-size: 0.95rem;
    }

    @media (max-width: 768px) {
      .gallery-grid {
        grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
        gap: 1.5rem;
      }

      .gallery-section {
        padding: 80px 15px;
      }
    }
  </style>
</head>
<body>
  <div id="particles-container"></div>
  <div class="cursor-glow"></div>

  <nav class="navbar">
    <div class="navbar-brand">Krishnam Dwivedi</div>
    <div class="hamburger">
      <span></span>
      <span></span>
      <span></span>
    </div>
    <ul class="navbar-menu">
      <li><a href="index.html" class="navbar-link">Home</a></li>
      <li><a href="about.html" class="navbar-link">About</a></li>
      <li><a href="skills.html" class="navbar-link">Skills</a></li>
      <li><a href="experience.html" class="navbar-link">Experience</a></li>
      <li><a href="certifications.html" class="navbar-link">Certifications</a></li>
      <li><a href="projects.html" class="navbar-link">Projects</a></li>
      <li><a href="gallery.html" class="navbar-link active">Gallery</a></li>
      <li><a href="contact.html" class="navbar-link">Contact</a></li>
    </ul>
  </nav>

  <section class="gallery-section">
    <div class="container">
      <div class="section-title">
        <h2>Visual Gallery</h2>
        <div class="accent-line"></div>
        <p style="margin-top: 1rem; max-width: 600px; margin-left: auto; margin-right: auto;">Explore visual moments from my journey in technology, design, and innovation.</p>
      </div>

      <!-- Gallery Grid -->
      <div class="gallery-grid" id="galleryGrid">
        <!-- Gallery items will be loaded here dynamically -->
        <div class="empty-gallery">
          <div class="empty-gallery-icon">🖼️</div>
          <div class="empty-gallery-text">Gallery is being curated</div>
          <div class="empty-gallery-subtext">Check back soon for visual content</div>
        </div>
      </div>
    </div>
  </section>

  <script src="js/main.js"></script>
  <script src="js/premium-3d.js"></script>
  <script src="js/advanced-3d.js"></script>
  <script>
    let galleryLoaded = false;

    function checkSectionVisibility() {
      try {
        const visibilityData = localStorage.getItem('cms_visibility_gallery');
        const galleryGrid = document.getElementById('galleryGrid');
        
        if (!visibilityData) return; // All sections active by default
        
        const data = JSON.parse(visibilityData);
        if (!data.visible) {
          // Hide gallery and show message
          galleryGrid.innerHTML = `
            <div style="grid-column: 1/-1; text-align: center; padding: 4rem 2rem; background: rgba(31, 31, 46, 0.3); border-radius: var(--radius-lg); border: 1px dashed rgba(168, 85, 247, 0.2);">
              <div style="font-size: 4rem; margin-bottom: 1rem; opacity: 0.6;">🔒</div>
              <p style="color: var(--text-secondary); font-size: 1.1rem; margin-bottom: 0.5rem;">${data.message || 'This section is currently disabled.'}</p>
              <p style="color: var(--text-tertiary); font-size: 0.9rem;">Check back soon for updates!</p>
            </div>
          `;
        }
      } catch (error) {
        console.log('Visibility check complete');
      }
    }

    function renderGalleryItem(image) {
      return `
        <div class="gallery-item" data-animate>
          <div class="gallery-image-container">
            <img src="${image.url}" alt="${image.title || 'Gallery Image'}" class="gallery-image" onerror="this.src='data:image/svg+xml,%3Csvg xmlns=%22http://www.w3.org/2000/svg%22 width=%22300%22 height=%22300%22%3E%3Crect fill=%22%23222%22 width=%22300%22 height=%22300%22/%3E%3Ctext fill=%22%23666%22 x=%2250%25%22 y=%2250%25%22 text-anchor=%22middle%22 dy=%22.3em%22 font-size=%2224%22 font-family=%22Arial%22%3EImage Not Found%3C/text%3E%3C/svg%3E'">
            <div class="gallery-overlay">
              <div class="gallery-title">${image.title || 'Untitled'}</div>
            </div>
          </div>
        </div>
      `;
    }

    function loadGalleryFromAdmin() {
      if (galleryLoaded) return;

      try {
        const galleryData = localStorage.getItem('cms_gallery_published');
        const galleryGrid = document.getElementById('galleryGrid');

        if (!galleryData) return;

        const gallery = JSON.parse(galleryData);
        if (!Array.isArray(gallery) || gallery.length === 0) return;

        // Clear empty state
        galleryGrid.innerHTML = '';

        // Render gallery items
        gallery.forEach(image => {
          galleryGrid.innerHTML += renderGalleryItem(image);
        });

        console.log(`✅ Loaded ${gallery.length} gallery images from Admin CMS`);
        galleryLoaded = true;
      } catch (error) {
        console.log('ℹ️ No gallery images published yet');
      }
    }

    // Initialize on page load
    document.addEventListener('DOMContentLoaded', () => {
      checkSectionVisibility();
      loadGalleryFromAdmin();
    });

    // Check visibility every 3 seconds
    setInterval(checkSectionVisibility, 3000);

    // Check for new gallery images every 3 seconds
    setInterval(loadGalleryFromAdmin, 3000);
  </script>
</body>
</html>
